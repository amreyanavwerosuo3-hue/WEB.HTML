<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <link rel="stylesheet" href="project2.css">
</head>
<body>
    
    <div class="auth-container">
        <section id="signup-page" class="auth-card">
            <h2>Create Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name"  placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="test@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="123456" required>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <p class="toggle-text">Already have an account? <a href="login.html">Login</a></p>
        </section>
<script src="project2.js" defer></script>
</body>
</html>
