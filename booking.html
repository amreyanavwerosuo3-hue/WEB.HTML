<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booking page</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>
    <form action="BOOK A TABLE"></form>
    <section class="booking-container">
        <h2>RESERVE A TABLE</h2>
        <p>Join us for a taste of home, please fill out the details below.</p>

        <div class="form-group">
            <input type="text" id="full name" placeholder="NAME" required>
        </div>
        <div class="grid-fields">
        <div class="form-group">
            <input type="date" id="date"  required>
        </div>

        <div class="form-group">
            <input type="time" id="time" required>
        </div>
        <div class="form-group">
            <label for="guests">Number of guests</label>
            <select name="guests" id="guests">
                <option value="1">1 person</option>
                <option value="2">2 people</option>
                <option value="3">3 people</option>
                <option value="4">4 people</option>
                <option value="6">6+ people</option>
            </select>
        </div>
        <div class="form-group">
            <label for="requests">special Requests</label>
            <textarea name="requests" id="requests" rows="3" placeholder="Anything we should knom">
            </textarea>
        </div>
        <a href="projects.html" ><button type="submit" class="book-btn">CORFIRM RESERVATION</button></a>
        </div>
    </section>
</body>
</html>
